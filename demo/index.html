<script>
  const _customElementsDefine = window.customElements.define;
  window.customElements.define = (name, cl, conf) => {
    if (!customElements.get(name)) {
      try {
        _customElementsDefine.call(window.customElements, name, cl, conf);
      } catch (e) {
        console.warn(e);
      }
    }
  };
</script>
<script type="module">
  import '@openenergytools/open-scd-core/open-scd.js';
  import { plugins } from './plugins.js';

  const editor = document.querySelector('open-scd');
  editor.plugins = plugins;

  const sample = await fetch('sample.scd').then(r => r.text());
  editor.docs = {
    'sample.scd': new DOMParser().parseFromString(sample, 'application/xml'),
  };
  editor.docName = 'sample.scd';
</script>
