name: Deploy PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (PR Preview)
        run: npm run build:preview

      - name: Prepare preview directory
        run: |
          cp -r dist preview/
          cp -r demo/ preview/
          sed -i "s|import { plugins } from './plugins.js'|import { plugins } from '../dist/plugins.js'|g" preview/demo/index.html
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=demo/"></head></html>' > preview/index.html

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: preview/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
